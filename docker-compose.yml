services:
  qdrant:
    image: qdrant/qdrant:v1.12.0 
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC (mais rápido pra alto volume)
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: techflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_only}
      POSTGRES_DB: techflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techflow"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # usado pra cache de embeddings, semantic cache, rate limit

volumes:
  qdrant_data:
  postgres_data: